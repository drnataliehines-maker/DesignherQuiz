  Courage:       { year:1, emoji:"🔥", color:"#C0392B", description:"Courage isn't the absence of fear — it's choosing your truth, your growth, or someone else's freedom, even when afraid.", alignment:"You speak up when it costs you something. You act before you feel ready. People draw strength from your nerve.", misalignment:"Confusing recklessness with bravery. Burning out from always being the one who steps up." },
  Purpose:       { year:1, emoji:"🌟", color:"#E8A838", description:"You are not here by accident. Purpose is the thread that connects your gifts to the world's deepest needs.", alignment:"Your work feels meaningful even when it's hard. You return to your 'why' during difficulty and it steadies you.", misalignment:"Busyness without direction. Achieving goals that don't satisfy because they were never truly yours." },
  Resilience:    { year:1, emoji:"🌊", color:"#4A7FA5", description:"You have an extraordinary capacity to absorb difficulty, adapt, and rise stronger. Setbacks are data — not defeat.", alignment:"You navigate change with grace. Your track record proves you don't stay down. Others draw strength from watching you rebuild.", misalignment:"Pushing through pain when rest is needed. Confusing relentless endurance with actual healing." },
  Boundaries:    { year:1, emoji:"🛡️", color:"#7A6A9E", description:"Boundaries are not walls — they are the perimeter of your self-respect. They teach others how to love you well.", alignment:"You protect your energy without guilt. Your relationships are honest and mutual because limits make love sustainable.", misalignment:"Chronic exhaustion from over-giving. Resentment building where boundaries were needed but never voiced." },
  "Self-Worth":  { year:1, emoji:"💛", color:"#D4A017", description:"Your value is not earned. It is inherent. Self-worth is the foundation everything else is built on.", alignment:"You make choices from worthiness, not fear. You don't settle — in love, work, or life — because you know what you deserve.", misalignment:"Overworking to prove value. Staying in rooms, relationships, or roles that don't honor who you are." },
  Clarity:       { year:1, emoji:"🔮", color:"#5B8A72", description:"Clarity is the luxury of truly knowing yourself — what you want, what you won't tolerate, and what matters most.", alignment:"You make decisions with confidence. Distractions don't derail you. You can say no easily because you know your yes.", misalignment:"Chronically overwhelmed by options. Saying yes to everything because you haven't named your priorities." },
  Creativity:    { year:1, emoji:"🎨", color:"#D4856A", description:"Ideas flow through you — in art, strategy, conversation, or design. Creative expression is a form of freedom and a way of making meaning.", alignment:"You thrive when given room to innovate, experiment, and make things beautiful. You're bored by the status quo.", misalignment:"Withering in rigid, repetitive environments. Work that doesn't allow invention drains your energy fast." },
  Leadership:    { year:1, emoji:"👑", color:"#9B59B6", description:"You are drawn to guiding, inspiring, and mobilizing others. You don't wait for permission — you set the vision and bring people along.", alignment:"You lead teams, mentor others, take initiative, and create environments where people feel seen and empowered.", misalignment:"Feeling stifled when micromanaged. Depleted when you're the only one carrying the vision forward." },
  Abundance:     { year:1, emoji:"🌿", color:"#27AE60", description:"Abundance is a way of seeing — one that notices what is present rather than mourning what is absent. It is the opposite of scarcity thinking.", alignment:"You give freely because you trust there is more. You receive compliments, opportunities, and help without deflecting.", misalignment:"Chronic comparison. Hoarding time, money, or credit out of fear there won't be enough." },
  Gratitude:     { year:1, emoji:"🌸", color:"#E91E8C", description:"Gratitude is not toxic positivity — it is the practice of noticing what is good while still naming what needs to change.", alignment:"You find meaning in ordinary moments. Difficulty doesn't cancel your appreciation for what is right.", misalignment:"Using gratitude to bypass legitimate grief or frustration. Dismissing your own needs as 'not that bad'." },
  Legacy:        { year:1, emoji:"🏛️", color:"#8D6E63", description:"Legacy is the answer to the question: What will remain when I'm gone? It is built in daily choices, not grand gestures.", alignment:"You make decisions with the long view in mind. You invest in people. You build things meant to outlast you.", misalignment:"So focused on leaving a mark that you miss the present. Or so present-focused that you never plant seeds." },
  Ambition:      { year:2, emoji:"🚀", color:"#6C5CE7", description:"You have a fire in you that won't be contained. You are driven to build, achieve, and create something that matters.", alignment:"You set audacious goals and pursue them relentlessly. You are energized by growth and momentum.", misalignment:"Restless in stagnant environments. Achievement becoming a substitute for actual fulfillment." },

function tallyValues(liked) {
  const counts = {};
  liked.forEach(w => w.values.forEach(v => { counts[v] = (counts[v] || 0) + 1; }));
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  const top = sorted.slice(0, 5).map(([v]) => v);
  if (top.length < 5) {
    const all = Object.keys(VALUES);
    for (const v of all) { if (!top.includes(v)) { top.push(v); if (top.length === 5) break; } }
  }
  return top;
}

function useWikiData(wikiTitle, skip) {
  const [data, setData] = useState(null);
  useEffect(() => {
    if (skip) return;
    let cancelled = false;
    fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${wikiTitle}`)
      .then(r => r.json())
      .then(d => { if (!cancelled) setData(d); })
      .catch(() => {});
    return () => { cancelled = true; };
  }, [wikiTitle, skip]);
  return data;
}

    if (!isTop) return;
    if (e.target.closest("[data-info-btn]")) return;
    startRef.current = { x: e.clientX, y: e.clientY };
    setDrag({ x:0, y:0, dragging:true });
  };
  const onPointerMove = (e) => {
    if (!drag.dragging || !startRef.current) return;
    setDrag({ x:e.clientX-startRef.current.x, y:e.clientY-startRef.current.y, dragging:true });
  };
  const onPointerUp = () => {
    if (!drag.dragging) return;
    if (drag.x > 80) triggerSwipe("right");
    else if (drag.x < -80) triggerSwipe("left");
    else setDrag({ x:0, y:0, dragging:false });
    startRef.current = null;
  };

  const tilt = isTop && drag.dragging ? drag.x / 15 : 0;
  const tx = swipeDir === "right" ? 620 : swipeDir === "left" ? -620 : drag.x;
  const ty = swipeDir ? -60 : drag.y * 0.3;
  const likeVis = isTop && (drag.x > 20 || swipeDir === "right");
  const passVis = isTop && (drag.x < -20 || swipeDir === "left");

  return (
    <div onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp} onPointerLeave={onPointerUp}
      style={{position:"absolute",width:"100%",height:"100%",borderRadius:24,cursor:isTop?"grab":"default",userSelect:"none",touchAction:"none",
        transform:`translateX(${tx}px) translateY(${ty}px) rotate(${tilt}deg)`,
        transition:swipeDir||!drag.dragging?"transform 0.38s cubic-bezier(.25,.46,.45,.94),opacity 0.38s":"none",
        opacity:swipeDir?0:1}}>
      <div style={{width:"100%",height:"100%",borderRadius:24,overflow:"hidden",position:"relative",
        background:imgUrl?"#111":`linear-gradient(160deg,${fallbackBg[0]},${fallbackBg[1]})`,
        boxShadow:isTop?"0 30px 80px rgba(0,0,0,0.65),0 0 0 1px rgba(255,255,255,0.05)":"0 10px 40px rgba(0,0,0,0.4)"}}>
        {imgUrl && <img src={imgUrl} alt={woman.name} style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",objectPosition:"top center"}}/>}
        {!imgUrl && (
          <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-58%)",
            fontSize:woman.name.split(" ").map(w=>w[0]).join("").length>2?64:96,
            fontFamily:"'Playfair Display',serif",fontWeight:700,color:"rgba(255,255,255,0.12)",letterSpacing:8,lineHeight:1}}>
            {woman.name.split(" ").map(w=>w[0]).join("")}
          </div>
        )}
        <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom,rgba(0,0,0,0.1) 30%,rgba(0,0,0,0.88) 100%)"}}/>
        {imgUrl && <div style={{position:"absolute",inset:0,background:"linear-gradient(160deg,rgba(0,0,0,0.2),transparent 50%)"}}/>}
        {isTop && (
          <button data-info-btn="1" onClick={(e) => { e.stopPropagation(); onInfo(woman, wikiData); }}
            style={{position:"absolute",top:16,right:16,width:36,height:36,borderRadius:"50%",background:"rgba(0,0,0,0.45)",border:"1px solid rgba(255,255,255,0.25)",color:"rgba(255,255,255,0.85)",fontSize:15,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",zIndex:10,fontFamily:"Georgia,serif",backdropFilter:"blur(4px)"}}>ℹ</button>
        )}
        <div style={{position:"absolute",top:16,left:16,display:"flex",gap:6,flexWrap:"wrap",maxWidth:"calc(100% - 70px)"}}>
          {woman.values.map(v => (
            <span key={v} style={{fontSize:9,fontFamily:"'Cormorant Garamond',serif",letterSpacing:2,textTransform:"uppercase",color:"rgba(255,255,255,0.75)",background:"rgba(0,0,0,0.4)",border:"1px solid rgba(255,255,255,0.18)",borderRadius:20,padding:"3px 9px",backdropFilter:"blur(6px)"}}>{v}</span>
          ))}
        </div>
        <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"24px 22px 26px"}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:700,color:"#fff",lineHeight:1.1,marginBottom:4}}>{woman.name}</div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:12,letterSpacing:2,textTransform:"uppercase",color:"rgba(255,255,255,0.5)"}}>{woman.title}</div>
        </div>
        <div style={{position:"absolute",inset:0,borderRadius:24,border:"4px solid #2ECC71",opacity:likeVis?Math.min(1,drag.x/100):0,transition:"opacity 0.1s",pointerEvents:"none",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <span style={{fontSize:72,transform:"rotate(-12deg)",filter:"drop-shadow(0 0 24px rgba(46,204,113,0.9))"}}>✦</span>
        </div>
        <div style={{position:"absolute",inset:0,borderRadius:24,border:"4px solid #E74C3C",opacity:passVis?Math.min(1,Math.abs(drag.x)/100):0,transition:"opacity 0.1s",pointerEvents:"none",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <span style={{fontSize:72,transform:"rotate(12deg)",filter:"drop-shadow(0 0 24px rgba(231,76,60,0.9))"}}>✕</span>
        </div>
      </div>
    </div>
  );
}

function WelcomeScreen({ onStart }) {
  return (
    <div style={{textAlign:"center",padding:"40px 32px",maxWidth:380,margin:"0 auto"}}>
      <div style={{fontSize:11,letterSpacing:5,textTransform:"uppercase",color:"#C9A84C",fontFamily:"'Cormorant Garamond',serif",marginBottom:14}}>DesignHer · Values Discovery</div>
      <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:42,fontWeight:700,color:"#F5EDD8",lineHeight:1.1,margin:"0 0 18px"}}>Who Do You<br/><em style={{color:"#C9A84C"}}>Admire?</em></h1>
      <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,color:"rgba(245,237,216,0.6)",lineHeight:1.65,marginBottom:32}}>
        Swipe right on women who move you. Skip those who don't. We'll reveal the 5 core values at the heart of how you're meant to live.
      </p>
      {[["✦","No right or wrong answers"],["✦","Tap ℹ to learn about any woman"],["✦","Rooted in 36 monthly life themes"]].map(([i,t]) => (
        <div key={t} style={{display:"flex",gap:12,alignItems:"center",marginBottom:10,textAlign:"left"}}>
          <span style={{color:"#C9A84C",fontSize:10}}>{i}</span>
          <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,color:"rgba(245,237,216,0.55)",letterSpacing:0.5}}>{t}</span>
        </div>
      ))}
      <button onClick={onStart} style={{width:"100%",marginTop:28,padding:"18px 0",background:"linear-gradient(135deg,#C9A84C,#E8C87A)",border:"none",borderRadius:14,fontFamily:"'Cormorant Garamond',serif",fontSize:17,letterSpacing:3,textTransform:"uppercase",color:"#1A0E00",fontWeight:700,cursor:"pointer",boxShadow:"0 8px 30px rgba(201,168,76,0.4)"}}>Discover My Values</button>
    </div>
  );
}

function EmailScreen({ likedCount, onSubmit }) {
  const [email, setEmail] = useState("");
  const [name, setName] = useState("");
  const [error, setError] = useState("");
  const submit = () => {
    if (!name.trim()) { setError("Please enter your first name."); return; }
    if (!email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) { setError("Please enter a valid email."); return; }
    onSubmit({ name: name.trim(), email: email.trim() });
  };
  const inp = {width:"100%",padding:"16px 18px",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(201,168,76,0.3)",borderRadius:12,fontFamily:"'Cormorant Garamond',serif",fontSize:16,color:"#F5EDD8",outline:"none",boxSizing:"border-box",marginBottom:12};
  return (
    <div style={{textAlign:"center",padding:"40px 32px",maxWidth:380,margin:"0 auto"}}>
      <div style={{fontSize:48,marginBottom:14}}>✨</div>
      <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:32,fontWeight:700,color:"#F5EDD8",lineHeight:1.2,marginBottom:12}}>Your Values Are<br/><em style={{color:"#C9A84C"}}>Ready.</em></h2>
      <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,color:"rgba(245,237,216,0.6)",marginBottom:6,lineHeight:1.5}}>You connected with <strong style={{color:"#C9A84C"}}>{likedCount} women</strong>.</p>
      <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,color:"rgba(245,237,216,0.45)",marginBottom:30,lineHeight:1.5}}>Enter your details to reveal your 5 core values — with a full breakdown of alignment, misalignment, and how to live each one.</p>
      <input value={name} onChange={e=>{setName(e.target.value);setError("");}} placeholder="First name" style={inp}/>
      <input value={email} onChange={e=>{setEmail(e.target.value);setError("");}} placeholder="Email address" type="email" style={inp}/>
      {error && <p style={{color:"#E74C3C",fontFamily:"'Cormorant Garamond',serif",fontSize:14,marginBottom:10}}>{error}</p>}
      <button onClick={submit} style={{width:"100%",padding:"18px 0",background:"linear-gradient(135deg,#C9A84C,#E8C87A)",border:"none",borderRadius:14,fontFamily:"'Cormorant Garamond',serif",fontSize:17,letterSpacing:3,textTransform:"uppercase",color:"#1A0E00",fontWeight:700,cursor:"pointer",boxShadow:"0 8px 30px rgba(201,168,76,0.4)",marginBottom:14}}>Reveal My Values</button>
      <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:12,color:"rgba(245,237,216,0.3)",letterSpacing:0.5}}>No spam. Your results will be sent to your inbox.</p>
    </div>
  );
}

function ValueCard({ valueName, index, expanded, onToggle }) {
  const v = VALUES[valueName];
  if (!v) return null;
  const yearLabel = ["Foundation","Expansion","Mastery"][v.year - 1];
  return (
    <div onClick={onToggle} style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${expanded?v.color+"70":"rgba(255,255,255,0.07)"}`,borderRadius:16,marginBottom:10,cursor:"pointer",overflow:"hidden",transition:"border-color 0.3s"}}>
      <div style={{display:"flex",alignItems:"center",gap:14,padding:"16px 18px"}}>
        <div style={{width:44,height:44,borderRadius:"50%",background:`${v.color}1A`,border:`1px solid ${v.color}50`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{v.emoji}</div>
        <div style={{flex:1}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:17,color:"#F5EDD8",fontWeight:700}}>{valueName}</div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:10,letterSpacing:2,textTransform:"uppercase",color:v.color,marginTop:2}}>{yearLabel} · Value #{index+1}</div>
        </div>
        <div style={{color:"rgba(245,237,216,0.35)",fontSize:16,transition:"transform 0.3s",transform:expanded?"rotate(180deg)":"none"}}>▾</div>
      </div>
      {expanded && (
        <div style={{padding:"0 18px 18px",borderTop:`1px solid ${v.color}18`}}>
          <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,color:"rgba(245,237,216,0.72)",lineHeight:1.65,marginBottom:14,marginTop:14}}>{v.description}</p>
          <div style={{background:`${v.color}0E`,borderLeft:`3px solid ${v.color}`,borderRadius:"0 8px 8px 0",padding:"12px 14px",marginBottom:8}}>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:10,letterSpacing:2,textTransform:"uppercase",color:v.color,marginBottom:5}}>✦ In Alignment</div>
            <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,color:"rgba(245,237,216,0.62)",lineHeight:1.6,margin:0}}>{v.alignment}</p>
          </div>
          <div style={{background:"rgba(231,76,60,0.05)",borderLeft:"3px solid rgba(231,76,60,0.45)",borderRadius:"0 8px 8px 0",padding:"12px 14px"}}>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:10,letterSpacing:2,textTransform:"uppercase",color:"rgba(231,76,60,0.65)",marginBottom:5}}>⚡ Out of Alignment</div>
            <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,color:"rgba(245,237,216,0.57)",lineHeight:1.6,margin:0}}>{v.misalignment}</p>
          </div>
        </div>
      )}
    </div>
  );
}

function ResultsScreen({ topValues, userName, onRestart }) {
  const [expanded, setExpanded] = useState(0);
  return (
    <div style={{padding:"30px 22px",maxWidth:420,margin:"0 auto"}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:11,letterSpacing:4,textTransform:"uppercase",color:"#C9A84C",fontFamily:"'Cormorant Garamond',serif",marginBottom:10}}>DesignHer · Values Report</div>
        <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:34,fontWeight:700,color:"#F5EDD8",lineHeight:1.15,margin:"0 0 12px"}}>{userName.split(" ")[0]}, you are<br/><em style={{color:"#C9A84C"}}>beautifully clear.</em></h2>
        <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,color:"rgba(245,237,216,0.5)",lineHeight:1.6,margin:0}}>These 5 values are the architecture of your most authentic life. Tap each to explore what alignment — and misalignment — looks like for you.</p>
      </div>
      {topValues.map((v, i) => (
        <ValueCard key={v} valueName={v} index={i} expanded={expanded===i} onToggle={()=>setExpanded(expanded===i?-1:i)}/>
      ))}
      <div style={{marginTop:24,background:"linear-gradient(135deg,rgba(201,168,76,0.1),rgba(201,168,76,0.05))",border:"1px solid rgba(201,168,76,0.22)",borderRadius:16,padding:"22px",textAlign:"center",marginBottom:14}}>
        <div style={{fontSize:26,marginBottom:10}}>📖</div>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:19,color:"#F5EDD8",fontWeight:700,marginBottom:8}}>Go Deeper with DesignHer</div>
        <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,color:"rgba(245,237,216,0.55)",lineHeight:1.6,margin:"0 0 16px"}}>The Values Discovery Workbook walks you through all 36 monthly themes — from Foundation to Mastery — to help you build a life designed around who you actually are.</p>
        <a href="https://designher.co" target="_blank" rel="noopener noreferrer" style={{display:"block",padding:"14px 0",background:"linear-gradient(135deg,#C9A84C,#E8C87A)",borderRadius:12,fontFamily:"'Cormorant Garamond',serif",fontSize:15,letterSpacing:3,textTransform:"uppercase",color:"#1A0E00",fontWeight:700,textDecoration:"none"}}>Get the Workbook →</a>
      </div>
      <div style={{textAlign:"center"}}>
        <button onClick={onRestart} style={{background:"transparent",border:"1px solid rgba(245,237,216,0.12)",borderRadius:12,padding:"11px 22px",fontFamily:"'Cormorant Garamond',serif",fontSize:12,letterSpacing:2,textTransform:"uppercase",color:"rgba(245,237,216,0.35)",cursor:"pointer"}}>Retake Quiz</button>
      </div>
    </div>
  );
}

function DesignHerQuiz() {
  const [phase, setPhase] = useState("welcome");
  const [deck, setDeck] = useState([...WOMEN]);
  const [liked, setLiked] = useState([]);
  const [bioPanel, setBioPanel] = useState(null);
  const [userData, setUserData] = useState(null);
  const [topValues, setTopValues] = useState([]);
  const ci = deck.length - 1;
  const handleLike = (woman) => setLiked(p => [...p, woman]);
  const doLike = (woman) => { handleLike(woman); setDeck(p => p.slice(0,-1)); };
  const doPass = () => setDeck(p => p.slice(0,-1));
  useEffect(() => { if (phase === "quiz" && deck.length === 0) setPhase("email"); }, [deck, phase]);
  const handleEmailSubmit = ({ name, email }) => { setUserData({ name, email }); setTopValues(tallyValues(liked)); setPhase("results"); };
  const handleRestart = () => { setDeck([...WOMEN]); setLiked([]); setBioPanel(null); setUserData(null); setTopValues([]); setPhase("welcome"); };
  const progress = ((WOMEN.length - deck.length) / WOMEN.length) * 100;

  return (
    <>
      <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0E0A06 0%,#1A1008 50%,#0E0A06 100%)",display:"flex",flexDirection:"column",alignItems:"center",overflowY:"auto"}}>
        <div style={{width:"100%",maxWidth:420,padding:"18px 24px 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontStyle:"italic",color:"#C9A84C",letterSpacing:1}}>DesignHer</span>
          {phase === "quiz" && <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:12,color:"rgba(245,237,216,0.35)",letterSpacing:1}}>{WOMEN.length - deck.length} / {WOMEN.length}</span>}
        </div>
        {phase === "quiz" && (
          <div style={{width:"100%",maxWidth:420,padding:"8px 24px 0"}}>
            <div style={{height:2,background:"rgba(255,255,255,0.05)",borderRadius:2}}>
              <div style={{height:"100%",width:`${progress}%`,background:"linear-gradient(90deg,#C9A84C,#E8C87A)",borderRadius:2,transition:"width 0.4s ease"}}/>
            </div>
          </div>
        )}
        <div style={{flex:1,width:"100%",maxWidth:420,display:"flex",flexDirection:"column"}}>
          {phase === "welcome" && <WelcomeScreen onStart={()=>setPhase("quiz")}/>}
          {phase === "quiz" && (
            <div style={{flex:1,display:"flex",flexDirection:"column",padding:"18px 22px 22px"}}>
              <div style={{position:"relative",flex:1,minHeight:460,maxHeight:520}}>
                {deck.length === 0 ? (
                  <div style={{height:"100%",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,color:"rgba(245,237,216,0.35)"}}>Tallying your results…</span>
                  </div>
                ) : deck.slice(-3).map((woman, i, arr) => {
                  const isTop = i === arr.length - 1;
                  const offset = arr.length - 1 - i;
                  const fbIdx = WOMEN.findIndex(w => w.name === woman.name) % BG_FALLBACKS.length;
                  return (
                    <div key={woman.name} style={{position:"absolute",inset:0,transform:`scale(${1-offset*0.04}) translateY(${offset*14}px)`,zIndex:i,transition:"transform 0.3s ease"}}>
                      <WomanCard woman={woman} isTop={isTop} fallbackBg={BG_FALLBACKS[fbIdx]} onLike={doLike} onPass={doPass} onInfo={(w,wd)=>setBioPanel({woman:w,wikiData:wd})}/>
                    </div>
                  );
                })}
              </div>
              <div style={{textAlign:"center",margin:"10px 0",fontFamily:"'Cormorant Garamond',serif",fontSize:12,color:"rgba(245,237,216,0.25)",letterSpacing:1}}>Swipe or use buttons · Tap ℹ to learn about her</div>
              <div style={{display:"flex",gap:20,justifyContent:"center",alignItems:"center"}}>
                <button onClick={()=>deck.length>0&&doPass()} style={{width:62,height:62,borderRadius:"50%",background:"rgba(231,76,60,0.1)",border:"2px solid rgba(231,76,60,0.28)",fontSize:22,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"rgba(231,76,60,0.75)",transition:"all 0.2s"}}
                  onMouseEnter={e=>{e.currentTarget.style.background="rgba(231,76,60,0.22)";e.currentTarget.style.transform="scale(1.1)";}}
                  onMouseLeave={e=>{e.currentTarget.style.background="rgba(231,76,60,0.1)";e.currentTarget.style.transform="scale(1)";}}>✕</button>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:10,letterSpacing:2,textTransform:"uppercase",color:"rgba(245,237,216,0.2)",textAlign:"center",lineHeight:2}}>Pass · <span style={{color:"#C9A84C"}}>✦</span> · Admire</div>
                <button onClick={()=>deck.length>0&&doLike(deck[ci])} style={{width:62,height:62,borderRadius:"50%",background:"rgba(201,168,76,0.1)",border:"2px solid rgba(201,168,76,0.3)",fontSize:22,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"rgba(201,168,76,0.85)",transition:"all 0.2s"}}
                  onMouseEnter={e=>{e.currentTarget.style.background="rgba(201,168,76,0.22)";e.currentTarget.style.transform="scale(1.1)";}}
                  onMouseLeave={e=>{e.currentTarget.style.background="rgba(201,168,76,0.1)";e.currentTarget.style.transform="scale(1)";}}>✦</button>
              </div>
              {liked.length > 0 && <div style={{textAlign:"center",marginTop:12,fontFamily:"'Cormorant Garamond',serif",fontSize:12,color:"rgba(201,168,76,0.5)"}}>{liked.length} {liked.length===1?"woman":"women"} admired</div>}
            </div>
          )}
          {phase === "email" && <EmailScreen likedCount={liked.length} onSubmit={handleEmailSubmit}/>}
          {phase === "results" && userData && <ResultsScreen topValues={topValues} userName={userData.name} onRestart={handleRestart}/>}
        </div>
      </div>
      {bioPanel && <BioPanel woman={bioPanel.woman} wikiData={bioPanel.wikiData} onClose={()=>setBioPanel(null)} onLike={()=>{doLike(bioPanel.woman);setBioPanel(null);}} onPass={()=>{doPass();setBioPanel(null);}}/>}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<DesignHerQuiz/>);
  </script>
  </body>
</html>
